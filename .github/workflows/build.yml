name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux
          - os: windows-latest
            suffix: windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install pillow tqdm pyinstaller

      - name: Build
        run: pyinstaller --onefile script.py

      - name: Rename binary
        run: |
          mkdir release
          if [ "${{ matrix.suffix }}" = "linux" ]; then
            mv dist/script release/mtg-treachery-tool-linux
          else
            mv dist/script.exe release/mtg-treachery-tool-windows.exe
          fi
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.suffix }}
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            build-linux/*
            build-windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}