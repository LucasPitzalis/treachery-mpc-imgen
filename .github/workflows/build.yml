name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            executable: mtg-treachery-tool
          - os: windows-latest
            name: windows
            executable: mtg-treachery-tool.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pillow tqdm pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name ${{ matrix.executable }} script.py

      - name: Rename output (Linux)
        if: matrix.name == 'linux'
        run: mv dist/${{ matrix.executable }} dist/mtg-treachery-tool-linux

      - name: Rename output (Windows)
        if: matrix.name == 'windows'
        run: |
          rename dist\\${{ matrix.executable }} mtg-treachery-tool-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-linux/*
            build-windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
